# 定时任务（Cron表达式）：'0 0 4 * * *' 表示每天凌晨4点执行
crontask: '0 0 4 * * *'

# CronTask 格式说明：
# * * * * * *
# | | | | | |
# | | | | | +---- 星期几   (1-7，1=周一，7=周日)
# | | | | +------ 月份     (1-12)
# | | | +-------- 日期     (1-31)
# | | +---------- 小时     (0-23)
# | +------------ 分钟     (0-59)
# +-------------- 秒       (0-59)

# 更多示例...
# crontask: '0 0 * * * *'  每小时执行一次
# crontask: '0 0 4 * * 7'  每周日凌晨4点执行
# crontask: '0 0 4 1 * *'  每月1号凌晨4点执行
# crontask: '0 30 3 */2 * *'  每2天的凌晨3:30执行

# 执行 /ebackup reload 命令后，控制台会显示定时任务的描述信息

# 备份文件的文件名格式
backup-format: 'eBackup {DATE}'

# 用于替换 {DATE} 的日期格式
# 格式说明请参考 java.text.SimpleDateFormat
backup-date-format: 'yyyy-MM-dd HH-mm-ss'

# 本地存储备份的文件夹路径
backup-path: 'plugins/eBackup/backups'

# 最大保留备份数量。超过后会删除旧的备份（≤ 0 表示不限制）
# 注意：此设置仅对本地备份有效（包括失败后的本地回退备份）
max-backups: 20

# 此选项可节省磁盘空间：仅当自上次备份或服务器启动以来有玩家加入过时才执行备份
only-backup-if-players-were-on: true

# 上传完成后删除本地备份文件
delete-after-upload: false

# ZIP 压缩级别（0-9）
# 数值越高文件越小，但备份会更消耗CPU时间
compression-level: 4

# FTP/SFTP 设置和配置
# 保存到这里的备份不会被自动删除
ftp:
    enable: false              # 是否启用
    path: '/home/user/backups/' # 远程路径（记得修改！）
    type: sftp                 # ftp = 普通FTP，sftp = SSH的SFTP
    host: 'localhost'          # 服务器地址
    port: 22                   # 端口
    user: 'username'           # 用户名
    pass: 'password'           # 密码
    use-key-auth: false        # 是否使用密钥认证（SFTP专用，会忽略密码）
    private-key: '~/.ssh/id_rsa'   # 私钥文件路径
    private-key-password: ''        # 私钥密码（无密码则留空）

# 要备份的内容
# 默认情况下会备份所有内容，可以在 ignore 中排除文件/文件夹
backup:
    pluginjars: true   # 是否备份插件的 .jar 文件
    pluginconfs: true  # 是否备份每个插件的 data 文件夹（配置文件）
    ignore:            # 要忽略、不备份的文件/目录
        - 'plugins/eBackup/backups'   # 排除备份文件夹本身
        - 'plugins/dynmap'            # 排除 dynmap 地图数据
        - 'logs'                      # 排除日志文件
        - 'cache'                     # 排除缓存文件夹